<div class="top-navbar">
    <div class="top-navbar-left">
        <label class="top-navbar-label" for="factoring-select">
            <mat-icon aria-hidden="false">domain</mat-icon></label>
        <select id="factoring-select" class="top-navbar-select" [value]="selectedFactoring"
            (change)="onFactoringChange($event)">
            @for (option of factoringOptions; track option.uuid) {
            <option [value]="option.uuid">{{ option.razonSocial }}</option>
            }
        </select>
    </div>

    <div class="top-navbar-actions">
        <button class="btn-mini-fab" [class.badge-pulse]="badgePulse" (click)="onNotificationsClick()"
            [attr.aria-expanded]="notificationsPanelOpen" aria-label="notificaciones">
            <mat-icon aria-hidden="false" [matBadge]="notificationBadgeText" matBadgeColor="warn"
                [matBadgeHidden]="!notificationBadgeText">notifications</mat-icon>
        </button>
    </div>
</div>
